version: '3.8'

x-airflow-common: &airflow-common
  image: apache/airflow:2.8.2
  environment:
    - AIRFLOW__CORE__EXECUTOR=LocalExecutor
    - AIRFLOW__WEBSERVER__SECRET_KEY=this_is_my_very_secret_key_123
    # FIXED: Changed 'postgres://' to 'postgresql://'
    - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
    - AIRFLOW__CORE__LOAD_EXAMPLES=False
    - AIRFLOW__WEBSERVER__SHOW_TRIGGER_FORM_IF_NO_PARAMS=True
  volumes:
    - ./dags:/opt/airflow/dags
    - /var/run/docker.sock:/var/run/docker.sock 
  user: root 

services:
  postgres:
    image: postgres:13
    environment:
      - POSTGRES_USER=airflow
      - POSTGRES_PASSWORD=airflow
      - POSTGRES_DB=airflow
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  airflow-init:
      <<: *airflow-common
      command: >
        bash -c "airflow db migrate &&
        airflow users create
        --username admin
        --firstname admin
        --lastname admin
        --role Admin
        --email jianpengchen92@gmail.com
        --password admin"
      depends_on:
        postgres:
          condition: service_healthy

  webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

  scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully